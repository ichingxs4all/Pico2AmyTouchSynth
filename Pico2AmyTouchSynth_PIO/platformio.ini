; PlatformIO configuration for Pico 2 Amy Touch Synth
; Board: Raspberry Pi Pico 2 (RP2350) with earlephilhower arduino-pico core
;
; First-time setup:
;   pio run --target upload
;
; Serial monitor:
;   pio device monitor

[env:rpipico2]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2
framework = arduino

; Use the earlephilhower arduino-pico core (mirrors the Arduino IDE board package)
board_build.core = earlephilhower

; Enable Adafruit TinyUSB stack (required for USB MIDI)
; Mirrors: Tools › USB Stack → "Adafruit TinyUSB" in the Arduino IDE
board_build.arduino.earlephilhower.usbstack = tinyusb

; No LittleFS partition needed
board_build.filesystem_size = 0

build_flags =
    -DUSE_TINYUSB

lib_deps =
    https://github.com/shorepine/amy.git
    https://github.com/todbot/TouchyTouch.git
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    adafruit/Adafruit TinyUSB Library

monitor_speed = 115200
